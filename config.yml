baseURL: https://pontograu.com
title: Ponto Grau
languages:
  en:
    locale: en-US
pagination:
  pagerSize: 8

menu:
  main:
    - name: Fino
      url: /fino/
      weight: 10
    - name: Agente WhatsApp
      url: /agente-whatsapp/
      weight: 20

params:
  author: Ponto Grau

  # Company landing page block.
  company:
    name: Ponto Grau
    tagline: Software que funciona. Qualidade em que você pode confiar.
    logo: /images/ponto-grau-logo.png

  # Portfolio profile block (used by layouts/portfolio/list.html).
  profile:
    name: Marco Sanchotene
    bio: >-
      Software Developer in Test building practical developer tooling,
      quality pipelines, and automation with a product mindset.
    image: /images/profile.png

  # Social links rendered on portfolio landing.
  socials:
    - name: github
      url: https://github.com/marcosanchotene
    - name: linkedin
      url: https://www.linkedin.com/in/marco-sanchotene
    - name: stackoverflow
      url: https://stackoverflow.com/users/5489111/marco-s
    - name: buymeacoffee
      url: https://www.buymeacoffee.com/m.sanchotene

  # Favicon assets.
  assets:
    favicon: /images/favicon.png
    favicon16x16: /images/favicon-16x16.png
    favicon32x32: /images/favicon-32x32.png
    apple_touch_icon: /images/apple-touch-icon.png
    safari_pinned_tab: /images/apple-touch-icon.png

enableInlineShortcodes: true
enableRobotsTXT: true
enableEmoji: true
pygmentsUseClasses: true

minify:
  disableXML: true
