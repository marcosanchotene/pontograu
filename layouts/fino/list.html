<!doctype html>
<html lang="{{ site.Language.Locale | default "en-us" }}">
<head>
  {{ partial "minimal_head.html" . }}
</head>
<body>
  <main class="shell shell-content">
    <header class="list-header">
      <p class="eyebrow"><a href="{{ "/" | relURL }}">{{ site.Title }}</a></p>
      <h1>{{ .Title }}</h1>
    </header>
    <article class="content-body">
      {{ .Content }}
      <p><a href="{{ "/fino/privacy-policy/" | relURL }}">Política de Privacidade →</a></p>
    </article>
  </main>
</body>
</html>
